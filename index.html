<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>王瑞琪 | RUIQI WANG - HMI & 产品专家数字作品集</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --glass: rgba(255, 255, 255, 0.15); /* 您要求的15%透明白 */
            --bg-dark: #020205;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'SF Pro Display', 'PingFang SC', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* 统一模糊效果 */
        .glass-effect {
            background: var(--glass);
            backdrop-filter: blur(12px); /* 您要求的12px模糊 */
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 导航栏 */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 20px 50px; display: flex; justify-content: space-between;
        }

        /* 简历主体部分 */
        .hero-section {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 0 20px;
        }

        /* 核心展示：智慧校园交互地图入口 */
        #interaction-module {
            width: 90%; max-width: 1200px; height: 600px;
            margin: 50px auto; position: relative; border-radius: 24px;
            overflow: hidden; border: 1px solid rgba(0, 242, 255, 0.3);
        }

        #static-cover {
            position: absolute; inset: 0; z-index: 10;
            background: url('中关村地图.jpg') center/cover no-repeat;
            display: flex; align-items: center; justify-content: center;
        }

        .start-btn {
            padding: 18px 40px; border-radius: 40px; border: 1px solid var(--neon-blue);
            background: var(--glass); color: var(--neon-blue);
            cursor: pointer; font-weight: bold; letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); transition: 0.3s;
        }

        iframe { width: 100%; height: 100%; border: none; display: none; }
    </style>
</head>
<body>

    <nav class="glass-effect">
        <div class="logo">RUIQI WANG</div>
        <div class="menu">PORTFOLIO / CONTACT</div>
    </nav>

    <section class="hero-section">
        <h1 style="font-size: 3.5rem; letter-spacing: 5px;">王瑞琪</h1>
        <p style="color: var(--neon-blue); margin: 20px 0;">北京理工大学 · 工业设计工程硕士</p>
        <div class="glass-effect" style="padding: 30px; border-radius: 20px; max-width: 800px;">
            <p>主导多项大型可视化大屏方案，具备 HMI 智驾感视觉设计经验。</p>
            <p style="margin-top: 10px; font-size: 0.9rem; opacity: 0.8;">曾参与兵器工业第201研究所实习，负责“一控多”车辆人机交互系统设计。</p>
        </div>
        <a href="#interaction-module" style="margin-top: 50px; color: #fff; text-decoration: none;">↓ 向下滑动查看地图交互动效</a>
    </section>

    <div id="interaction-module">
        <div id="static-cover">
            <button class="start-btn glass-effect" onclick="startMap()">开启智慧校园交互 / START HMI</button>
        </div>
        <iframe id="map-frame" src="about:blank"></iframe>
    </div>

    <script>
        function startMap() {
            document.getElementById('static-cover').style.display = 'none';
            const frame = document.getElementById('map-frame');
            frame.style.display = 'block';
            // 王总，再次确认这里是您改名后的 Axure 首页文件名
            frame.src = 'main.html'; 
        }
    </script>
</body>
</html>

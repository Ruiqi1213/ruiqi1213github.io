<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王瑞琪 | HMI & 产品专家数字作品集</title>
    <style>
        :root { --neon-blue: #00f2ff; --glass: rgba(255, 255, 255, 0.12); --bg-dark: #020205; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-dark); color: #fff; font-family: 'SF Pro Display', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        .glass-effect { background: var(--glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 28px; transition: 0.4s; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle at center, #0a1128 0%, #020205 80%); }
        .hero h1 { font-size: 5rem; letter-spacing: 10px; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .action-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 85%; max-width: 1100px; margin-top: 50px; }
        .action-item { padding: 30px; text-decoration: none; color: #fff; text-align: center; cursor: pointer; }
        .section { padding: 100px 10%; }
        .card { padding: 40px; margin-bottom: 30px; display: grid; grid-template-columns: 2fr 1fr; gap: 40px; }
        .stat-value { font-size: 3.5rem; font-weight: 800; color: var(--neon-blue); }
    </style>
</head>
<body>
    <section class="hero">
        <p style="opacity: 0.5;">北京理工大学 · 工业设计硕士</p>
        <h1>王瑞琪</h1>
        <p style="color: var(--neon-blue); letter-spacing: 5px;">HMI PRODUCT MANAGER</p>
        <div class="action-container">
            <a href="mailto:ruiqi1213@foxmail.com" class="glass-effect action-item"><i>📄</i><h4>下载简历</h4></a>
            <a href="#projects" class="glass-effect action-item"><i>🕹️</i><h4>军工交互原型</h4></a>
            <a href="#campus" class="glass-effect action-item"><i>🏫</i><h4>智慧校园大屏</h4></a>
        </div>
    </section>

    <section class="section" id="projects">
        <h2 style="margin-bottom:40px; border-left:5px solid var(--neon-blue); padding-left:20px;">核心项目经验</h2>
        <div class="glass-effect card">
            <div>
                <h3>一控多车辆人机交互系统 (To G)</h3>
                <p style="opacity: 0.7; margin-top:15px;">主导 6 版交互流程迭代，通过眼动分析定位 20+ 项卡点，提升操控效率 35.5%。</p>
            </div>
            <div style="text-align: right;"><div class="stat-value">35.5%</div><p>效率提升</p></div>
        </div>
        <div class="glass-effect card">
            <div>
                <h3>多人协作车辆 HMI 项目 (To B)</h3>
                <p style="opacity: 0.7; margin-top:15px;">通过验收并正式上车；实现信息布局合理、权限清晰、交互无冲突。</p>
            </div>
            <div style="text-align: right;"><div class="stat-value">正式上车</div></div>
        </div>
    </section>

    <section class="section" id="campus" style="background: rgba(255,255,255,0.02);">
        <h2 style="margin-bottom:40px;">专项成果</h2>
        <div class="glass-effect" style="padding:40px;">
            <p>🏆 考研 428 分（908 名考生中取得第 1 名）</p>
            <p style="margin-top:15px;">💻 独立完成北京理工大学中关村校区智慧校园大屏 UI 地图绘制。</p>
        </div>
    </section>
</body>
</html>
